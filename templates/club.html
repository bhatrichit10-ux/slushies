<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ club_name }} - Stats</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">

</head>
<body class="bg-slate-900">
    <div class="container bg-slate-900 p-6 rounded-lg shadow-lg text-white">
        <h1 class="text-3xl text-amber-50">{{ club_name }} - Stats</h1>
    </div>
    <div class="container bg-slate-800 p-6 rounded-lg shadow-lg text-white mt-4">
        <p> Status - {{ status }}</p>
        <p> Level- {{ level }}</p>
        <p> Attendees Estimated - {{ attendees }}</p>
        <p> Meeting Days- {{ meeting_days }}</p>
        <p> Meeting Length- {{ meeting_length }}</p>
        <p> Country- {{ country }}</p>
        <p> Time of Creation- {{ created_time }}</p>
    </div>

</body>
</html>
