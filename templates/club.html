<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ club_name }} - Stats</title>
<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-slate-900">
    <div class="container bg-slate-900 p-6 rounded-lg shadow-lg text-white">
        <h1 class="text-3xl text-amber-50">{{ club_name }} - Stats</h1>
    </div>
    <div class="container bg-slate-800 p-6 rounded-lg shadow-lg text-white mt-4">
        <p class="text-sm text-white mt-4"> Status - <span class="text-emerald-600"> {{ status }} </span></p>
        <p class="text-sm text-gray-400 mt-4"> Level - <span class="text-emerald-600"> {{ level }} </span></p>
        <p class="text-sm text-gray-400 mt-4"> Attendees Estimated - <span class="text-emerald-600">{{ attendees }}</span></p>
        <p class="text-sm text-gray-400 mt-4"> Meeting Days- <span class="text-emerald-600">{{ meeting_days }}</span></p>
        <p class="text-sm text-gray-400 mt-4"> Meeting Length- <span class="text-emerald-600">{{ meeting_length }}</span></p>
        <p class="text-sm text-gray-400 mt-4"> Country- <span class="text-emerald-600">{{ country }}</span></p>
        <p class="text-sm text-gray-400 mt-4"> Time of Creation- <span class="text-emerald-600">{{ created_time }}</span></p>
    </div>
     
<a class="text-sm text-amber-400 hover:underline mt-4 block text-center" href="/">Home</a>
    <p class="text-center text-gray-500 text-xs mt-4">Data sourced from <a href="clubsapi.hackclub.com" class="text-amber-400 hover:underline">Hack Club's Clubs API</a></p>
</body>
</html>
